# ── Conditional auth: only require password on dev domain ──
map $host $auth_realm {
    dev.notelys.org   "Notelys Dev — Authorized Access Only";
    default           "off";
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── www → non-www redirect ──
    if ($host = 'www.notelys.org') {
        return 301 https://notelys.org$request_uri;
    }

    # ── Password protection (only activates on dev.notelys.org) ──
    auth_basic $auth_realm;
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React Router — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
