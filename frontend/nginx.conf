# ── 301 redirect: www → non-www ──
server {
    listen 8080;
    server_name www.notelys.org;

    return 301 https://notelys.org$request_uri;
}

# ── Dev environment (password protected) ──
server {
    listen 8080;
    server_name dev.notelys.org;

    root /usr/share/nginx/html;
    index index.html;

    auth_basic "Notelys Dev";
    auth_basic_user_file /etc/nginx/.htpasswd;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Production (public) ──
server {
    listen 8080;
    server_name notelys.org *.run.app;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Catch-all fallback ──
server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── BLOCK DIRECT CLOUD RUN URLs ──
server {
    listen 8080;
    
    # This regex catches ANY domain that ends in .run.app
    server_name ~\.run\.app$;
    
    # Instantly reject the traffic with a 403 Forbidden error
    return 403; 
}
