# ── DNS resolver for proxying to Cloud Run backends ──
resolver 8.8.8.8 valid=30s;

# ── 301 redirect: www → non-www ──
server {
    listen 8080;
    server_name www.kalamio.com;

    return 301 https://kalamio.com$request_uri;
}

# ── Dev environment (password protected) ──
server {
    listen 8080;
    server_name dev.kalamio.com;

    root /usr/share/nginx/html;
    index index.html;

    auth_basic "Kalamio Dev";
    auth_basic_user_file /etc/nginx/.htpasswd;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Reverse proxy /api to dev backend (no auth_basic for API calls)
    location /api/ {
        auth_basic off;
        set $dev_backend "https://kalamio-api-development-770359912258.us-central1.run.app";
        proxy_pass $dev_backend;
        proxy_set_header Host kalamio-api-development-770359912258.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Production (public) ──
server {
    listen 8080;
    server_name kalamio.com;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Reverse proxy /api to production backend
    location /api/ {
        set $prod_backend "https://kalamio-api-770359912258.us-central1.run.app";
        proxy_pass $prod_backend;
        proxy_set_header Host kalamio-api-770359912258.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Catch-all fallback (raw Cloud Run URLs, health checks) ──
server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
