# ── 301 redirect: www.notelys.org → notelys.org ──
server {
    listen 8080;
    server_name www.notelys.org;

    return 301 https://notelys.org$request_uri;
}

# ── Dev environment (password protected) ──
server {
    listen 8080;
    server_name dev.notelys.org;

    root /usr/share/nginx/html;
    index index.html;

    # HTTP Basic Auth — only for dev
    auth_basic "Notelys Dev — Authorized Access Only";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React Router — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Production (public, no auth) ──
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React Router — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
